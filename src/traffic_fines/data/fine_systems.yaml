# Fine system configurations
flat:
  amount: 130
  unit: USD
  description: "Fixed fine regardless of income"
  source: "US national average traffic fine; NCSC 2023"

income_based:
  rate: 0.02
  min_fine: 10
  unit: USD
  description: "Income-proportional fine: fine = rate * income * speeding_intensity"
  source: "Calibrated to approximate day-fine formula; Kantorowicz-Reznichenko & Faure 2021"
  severity_days: 12
  source_severity: "Typical day count for 20+ mph over limit"
