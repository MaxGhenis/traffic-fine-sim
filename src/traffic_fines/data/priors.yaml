# Model parameter priors for Monte Carlo uncertainty propagation
# Each prior is Normal(mean, sd) unless otherwise noted

agent:
  alpha:
    mean: 0.5
    sd: 0.15
    source: "Calibrated to match US speeding rates"
    description: "Speeding utility weight in log utility"
  beta:
    mean: 1.0
    sd: 0.3
    source: "Standard labor disutility calibration; Keane 2011"
    description: "Labor disutility coefficient"
  max_hours:
    mean: 2080
    sd: 0
    source: "Standard full-time work year (40h/week * 52 weeks)"
    description: "Maximum annual work hours"

safety:
  vsl:
    mean: 11600000
    sd: 2900000
    source: "US EPA 2024; $11.6M central estimate"
    description: "Value of statistical life (USD)"
    unit: USD
  death_prob_base:
    mean: 0.00012
    sd: 0.00006
    source: "NHTSA FARS: 1.37 deaths per 100M VMT; ~13,400 mi/yr avg → 0.00012 annual base probability"
    description: "Baseline annual traffic death probability for active drivers"
  speed_fatality_exponent:
    mean: 4.0
    sd: 0.5
    source: "Nilsson 2004 power model; n≈4 for fatalities"
    description: "Exponent in p(s) = p_base * (1+s)^n"

labor:
  elasticity:
    mean: 0.25
    sd: 0.10
    source: "Chetty 2012; Hicksian elasticity 0.25 [0.15, 0.35]"
    description: "Compensated labor supply elasticity"
