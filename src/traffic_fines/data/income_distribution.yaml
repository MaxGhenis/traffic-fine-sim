# US income distribution from CPS microdata via PolicyEngine
distribution:
  type: cps_microdata
  source_file: cps_agents.parquet
  mean_income: 55000
  income_std: 45000
  unit: USD
  source: "PolicyEngine US Enhanced CPS 2024; working-age adults with employment income"

simulation:
  n_agents: 1000
  source: "Simulation resolution; convergence tested at 500, 1000, 2000"
