# Speed externality parameters
# NOTE: These externality values are not used in the core welfare comparison
# model, which focuses on private mortality risk. They are retained for
# potential future extensions incorporating external costs of speeding.

congestion:
  cost_per_incident: 54000
  unit: USD
  source: "NHTSA crash cost estimates (2024); average economic cost per crash"

environment:
  co2_per_speed_unit: 0.05
  unit: "kg CO2 per km per unit speed increase"
  source: "Estimated from fuel consumption curves"

noise:
  cost_per_db: 1100
  unit: USD/year
  source: "US DOT noise valuation guidance (approximate EUR-USD conversion)"
